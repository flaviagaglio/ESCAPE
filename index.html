<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESCAPE FROM FRANK · Flavia Gaglio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0c10;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            background-image: radial-gradient(#1f1f2e 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(10, 8, 20, 0.9);
            backdrop-filter: blur(5px);
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 10px #00ffff33;
            border-radius: 0px;
            padding: 1rem;
            color: #bbff00;
            position: relative;
        }
        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 3px;
            color: #00ffff;
            text-shadow: 2px 2px 0 #ff00c1, -2px -2px 0 #00ffff;
            animation: glitch 2s infinite;
            margin-bottom: 0.3rem;
        }
        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(2deg, 1deg); opacity: 0.8; }
            96% { transform: skew(-2deg, -1deg); opacity: 0.9; }
            97% { transform: skew(0deg, 0deg); opacity: 1; }
        }
        .status-panel {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 2px dashed #bbff00;
            padding-bottom: 0.3rem;
        }
        .canvas-wrapper {
            border: 3px solid #00ffff;
            box-shadow: 0 0 15px #00ffff;
            margin-bottom: 0.8rem;
            background: #000;
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        .touch-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .dpad-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }
        .dpad-btn {
            width: 90px;
            height: 90px;
            background: rgba(0, 255, 255, 0.1);
            border: 3px solid #00ffff;
            color: #00ffff;
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 5px 0 #008b8b, 0 0 15px #00ffff;
            user-select: none;
            touch-action: manipulation;
            cursor: pointer;
            transition: 0.05s;
        }
        .dpad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #008b8b, 0 0 25px #ff00c1;
            background: rgba(255, 0, 255, 0.2);
            border-color: #ff00c1;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .cyber-button {
            background: transparent;
            color: #00ffff;
            border: 3px solid #00ffff;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 0 #008b8b, 0 0 15px #00ffff;
            transition: 0.1s;
            flex: 1;
            min-width: 140px;
            touch-action: manipulation;
        }
        .cyber-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #ff00c1, 0 0 25px #ff00c1;
            background: #00ffff33;
            color: #ff00c1;
            border-color: #ff00c1;
        }
        .footer {
            margin-top: 1rem;
            text-align: center;
            color: #00ffff;
            font-size: 1rem;
            border-top: 2px dashed #bbff00;
            padding-top: 0.5rem;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .dpad-btn { width: 80px; height: 80px; font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>ESCAPE FROM FRANK</h1>
        <div class="status-panel">
            <span>STATO: <span id="gameStatus">IN CORSO</span></span>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1248" height="720"></canvas> <!-- 26x15 celle da 48px -->
        </div>
        <div class="touch-controls">
            <div class="dpad-row">
                <button class="dpad-btn" id="btnUp">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="btnLeft">◀</button>
                <button class="dpad-btn" id="btnDown">▼</button>
                <button class="dpad-btn" id="btnRight">▶</button>
            </div>
        </div>
        <div class="action-buttons">
            <button class="cyber-button" id="startBtn">▶ AVVIA</button>
            <button class="cyber-button" id="resetBtn">⟲ RESET</button>
        </div>
        <div class="footer">
            RAGGIUNGI LA CASA DELLA MUSICA · EVITA FRANK · USA I PULSANTI
        </div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            const statusSpan = document.getElementById('gameStatus');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');

            // Dimensioni: celle 48x48, griglia 26x15
            const TILE_SIZE = 48;
            const GRID_COLS = 26;
            const GRID_ROWS = 15;
            canvas.height = GRID_ROWS * TILE_SIZE;
            canvas.width = GRID_COLS * TILE_SIZE;

            // Stato gioco
            let gameRunning = false;
            let gameWin = false;
            let gameLose = false;
            let frameId = null;
            let frames = 0;

            // Posizioni
            let player = { x: 3, y: 8 };
            let frank = { x: 18, y: 8 };
            const house = { x: 12, y: 3, w: 5, h: 3 }; // casa 5x3
            const church = { x: 20, y: 2, w: 4, h: 3 }; // chiesa 4x3
            const car = { x: 15, y: 11, w: 3, h: 2 };   // macchina 3x2
            let toby = { x: 6, y: 12, direction: 1 };   // cane
            let donAldo = { x: 22, y: 4 };               // prete

            // Mappa ostacoli (1 = albero, 2 = cespuglio, 3 = recinto)
            const map = Array(GRID_ROWS).fill().map(() => Array(GRID_COLS).fill(0));
            // Bordi
            for (let i = 0; i < GRID_COLS; i++) {
                map[0][i] = 1;
                map[GRID_ROWS-1][i] = 1;
            }
            for (let i = 0; i < GRID_ROWS; i++) {
                map[i][0] = 1;
                map[i][GRID_COLS-1] = 1;
            }
            // Alberi e cespugli
            for (let i = 2; i < 5; i++) {
                map[i][8] = 1;
                map[i][14] = 1;
                map[i][20] = 1;
            }
            for (let i = 7; i < 10; i++) {
                map[7][i] = 2;
                map[9][i] = 2;
            }
            // Recinto chiesa
            for (let i = 0; i < 4; i++) {
                map[church.y-1][church.x + i] = 3;
                map[church.y+church.h][church.x + i] = 3;
            }
            for (let i = 0; i < 3; i++) {
                map[church.y + i][church.x-1] = 3;
                map[church.y + i][church.x+church.w] = 3;
            }

            // Tasti virtuali
            const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };

            // --- Audio con melodia corretta in loop ---
            let audioCtx = null;
            let musicPlaying = false;
            let nextNoteTime = 0;
            let currentNote = 0;
            let timerID = null;

            // Frequenze: do=262, si=247, la=220, sol=196, fa=175, mi=165, re=147, pausa=0
            const melody = [
                262, 262, 262, 247, 220, 196, 0,   // do do do si la sol _ 
                175, 175, 175, 165, 147, 131       // fa fa fa mi re do
            ];
            const NOTE_DURATION = 0.4; // secondi per nota

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            function playNote(freq, startTime) {
                if (freq === 0) return; // pausa
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + NOTE_DURATION - 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + NOTE_DURATION);
            }

            function scheduleNotes() {
                if (!musicPlaying) return;
                const now = audioCtx.currentTime;
                // Programma note per i prossimi 2 secondi
                while (nextNoteTime < now + 2) {
                    playNote(melody[currentNote], nextNoteTime);
                    nextNoteTime += NOTE_DURATION;
                    currentNote++;
                    if (currentNote >= melody.length) {
                        currentNote = 0; // loop
                    }
                }
                timerID = setTimeout(scheduleNotes, 50); // controlla ogni 50ms
            }

            function startMusic() {
                if (!audioCtx) initAudio();
                if (musicPlaying) return;
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        musicPlaying = true;
                        nextNoteTime = audioCtx.currentTime;
                        currentNote = 0;
                        scheduleNotes();
                    });
                } else {
                    musicPlaying = true;
                    nextNoteTime = audioCtx.currentTime;
                    currentNote = 0;
                    scheduleNotes();
                }
            }

            function stopMusic() {
                musicPlaying = false;
                if (timerID) {
                    clearTimeout(timerID);
                    timerID = null;
                }
            }

            // Avvia musica al primo tocco/clic
            window.addEventListener('touchstart', function initTouch() {
                startMusic();
                window.removeEventListener('touchstart', initTouch);
            });
            window.addEventListener('click', function initClick() {
                startMusic();
                window.removeEventListener('click', initClick);
            });

            // --- Disegno ambienti ---
            function drawBackground() {
                ctx.fillStyle = '#7cb342';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Texture erba
                ctx.fillStyle = '#558b2f';
                for (let i = 0; i < canvas.width; i += 12) {
                    for (let j = 0; j < canvas.height; j += 12) {
                        if ((i + j) % 24 === 0) {
                            ctx.fillRect(i, j, 4, 4);
                        }
                    }
                }
            }

            function drawTree(x, y) {
                const tx = x * TILE_SIZE;
                const ty = y * TILE_SIZE;
                ctx.fillStyle = '#5d3a1a';
                ctx.fillRect(tx+12, ty+20, 24, 24);
                ctx.fillStyle = '#2e8b57';
                ctx.beginPath();
                ctx.arc(tx+24, ty+12, 15, 0, Math.PI*2);
                ctx.fill();
            }

            function drawBush(x, y) {
                const bx = x * TILE_SIZE;
                const by = y * TILE_SIZE;
                ctx.fillStyle = '#2e7d32';
                ctx.beginPath();
                ctx.arc(bx+24, by+24, 18, 0, Math.PI*2);
                ctx.fill();
            }

            function drawFence(x, y) {
                const fx = x * TILE_SIZE;
                const fy = y * TILE_SIZE;
                ctx.fillStyle = '#8b5a2b';
                ctx.fillRect(fx+6, fy+6, 36, 12);
                ctx.fillRect(fx+6, fy+24, 36, 12);
                for (let i = 0; i < 3; i++) {
                    ctx.fillRect(fx+12+ i*12, fy, 6, 36);
                }
            }

            // Casa della musica
            function drawHouse() {
                const hx = house.x * TILE_SIZE;
                const hy = house.y * TILE_SIZE;
                ctx.fillStyle = '#b87333';
                ctx.fillRect(hx, hy, TILE_SIZE*5, TILE_SIZE*3);
                ctx.fillStyle = '#8b5a2b';
                ctx.fillRect(hx+10, hy+10, TILE_SIZE*5-20, TILE_SIZE*3-20);
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(hx+30, hy+25, 35, 30);
                ctx.fillRect(hx+120, hy+25, 35, 30);
                ctx.fillStyle = '#5d3a1a';
                ctx.fillRect(hx+90, hy+70, 40, TILE_SIZE*3-70);
                ctx.font = 'bold 28px "Courier New", monospace';
                ctx.fillStyle = '#ffff00';
                ctx.fillText('CASA DELLA', hx+30, hy+100);
                ctx.fillText('MUSICA', hx+20, hy+140);
                ctx.font = '40px "Courier New", monospace';
                ctx.fillStyle = '#ff69b4';
                ctx.fillText('♪', hx+160, hy+70);
            }

            // Chiesa
            function drawChurch() {
                const cx = church.x * TILE_SIZE;
                const cy = church.y * TILE_SIZE;
                ctx.fillStyle = '#d32f2f';
                ctx.fillRect(cx, cy, TILE_SIZE*4, TILE_SIZE*3);
                ctx.fillStyle = '#b71c1c';
                ctx.fillRect(cx+12, cy+12, TILE_SIZE*4-24, TILE_SIZE*3-24);
                ctx.fillStyle = '#b71c1c';
                ctx.fillRect(cx+140, cy-20, 40, 50);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(cx+160, cy-30, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(cx+160, cy-45);
                ctx.lineTo(cx+160, cy-15);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx+145, cy-30);
                ctx.lineTo(cx+175, cy-30);
                ctx.stroke();
            }

            // Macchina grigia
            function drawCar() {
                const cx = car.x * TILE_SIZE;
                const cy = car.y * TILE_SIZE;
                ctx.fillStyle = '#757575';
                ctx.fillRect(cx, cy+20, TILE_SIZE*3, TILE_SIZE);
                ctx.fillRect(cx+12, cy, 60, 20);
                ctx.fillStyle = '#424242';
                ctx.fillRect(cx+12, cy+35, 20, 20);
                ctx.fillRect(cx+80, cy+35, 20, 20);
                ctx.fillStyle = '#bdbdbd';
                ctx.fillRect(cx+36, cy+8, 12, 8);
                ctx.fillRect(cx+72, cy+8, 12, 8);
            }

            // Cane TOBY
            function drawToby(x, y) {
                const tx = x * TILE_SIZE;
                const ty = y * TILE_SIZE;
                ctx.fillStyle = '#8d6e63';
                ctx.fillRect(tx+12, ty+24, 24, 12);
                ctx.fillRect(tx+6, ty+12, 12, 12);
                ctx.fillRect(tx+30, ty+12, 12, 12);
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(tx+8, ty+16, 6, 6);
                ctx.fillRect(tx+34, ty+16, 6, 6);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillText('TOBY', tx+8, ty-6);
            }

            // Don Aldo
            function drawDonAldo(x, y) {
                const dx = x * TILE_SIZE;
                const dy = y * TILE_SIZE;
                ctx.fillStyle = '#212121';
                ctx.fillRect(dx+16, dy+12, 16, 28);
                ctx.fillStyle = '#f5e6d3';
                ctx.fillRect(dx+14, dy, 20, 16);
                ctx.fillStyle = '#000';
                ctx.fillRect(dx+18, dy+6, 4, 4);
                ctx.fillRect(dx+26, dy+6, 4, 4);
                ctx.fillStyle = '#fff';
                ctx.fillRect(dx+16, dy+16, 16, 4);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(dx+34, dy+2);
                ctx.lineTo(dx+44, dy+2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(dx+39, dy-3);
                ctx.lineTo(dx+39, dy+7);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.fillText('Don Aldo', dx, dy-8);
            }

            // Frank
            function drawFrank(x, y) {
                const px = x * TILE_SIZE;
                const py = y * TILE_SIZE;
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(px+12, py+4, 24, 16);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(px+14, py+8, 6, 6);
                ctx.fillRect(px+26, py+8, 6, 6);
                ctx.fillStyle = '#000';
                ctx.fillRect(px+16, py+10, 4, 4);
                ctx.fillRect(px+28, py+10, 4, 4);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(px+10, py+5);
                ctx.lineTo(px+18, py+8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px+28, py+8);
                ctx.lineTo(px+36, py+5);
                ctx.stroke();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px+20, py+6);
                ctx.lineTo(px+26, py+12);
                ctx.stroke();
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(px+18, py+20, 10, 4);
                ctx.fillStyle = '#95a5a6';
                ctx.fillRect(px+14, py+26, 18, 16);
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(px+36, py+18, 24, 5);
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(px+56, py+16, 6, 8);
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(px+6, py+26, 8, 8);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(px+14, py+42, 18, 6);
            }

            // Giocatrice
            function drawPlayer(x, y) {
                const px = x * TILE_SIZE;
                const py = y * TILE_SIZE;
                ctx.fillStyle = '#5d3a1a';
                ctx.fillRect(px+10, py+4, 28, 10);
                ctx.fillRect(px+6, py+6, 36, 8);
                ctx.fillRect(px+12, py+12, 24, 6);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(px+14, py+14, 20, 16);
                ctx.fillStyle = '#fff';
                ctx.fillRect(px+18, py+18, 5, 8);
                ctx.fillRect(px+26, py+18, 5, 8);
                ctx.fillStyle = '#000';
                ctx.fillRect(px+19, py+20, 4, 4);
                ctx.fillRect(px+27, py+20, 4, 4);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px+16, py+12);
                ctx.lineTo(px+20, py+14);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px+28, py+14);
                ctx.lineTo(px+32, py+12);
                ctx.stroke();
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(px+21, py+28, 6, 4);
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(px+10, py+20, 4, 4);
                ctx.fillRect(px+34, py+20, 4, 4);
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(px+14, py+30, 20, 8);
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(px+14, py+38, 20, 6);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(px+6, py+30, 6, 8);
                ctx.fillRect(px+36, py+30, 6, 8);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(px+4, py+36, 6, 6);
                ctx.fillRect(px+38, py+36, 6, 6);
            }

            // Funzioni di gioco
            function isObstacle(x, y) {
                if (x < 0 || x >= GRID_COLS || y < 0 || y >= GRID_ROWS) return true;
                if (x >= house.x && x < house.x + house.w && y >= house.y && y < house.y + house.h) return true;
                if (x >= church.x && x < church.x + church.w && y >= church.y && y < church.y + church.h) return true;
                if (x >= car.x && x < car.x + car.w && y >= car.y && y < car.y + car.h) return true;
                if (x === toby.x && y === toby.y) return true;
                if (x === donAldo.x && y === donAldo.y) return true;
                return map[y][x] === 1 || map[y][x] === 2 || map[y][x] === 3;
            }

            function isHouse(x, y) {
                return (x >= house.x && x < house.x + house.w && y >= house.y && y < house.y + house.h);
            }

            function resetGame() {
                gameRunning = false;
                gameWin = false;
                gameLose = false;
                statusSpan.textContent = 'IN CORSO';
                player = { x: 3, y: 8 };
                frank = { x: 18, y: 8 };
                toby = { x: 6, y: 12, direction: 1 };
                while (isObstacle(player.x, player.y)) player.x++;
                while (isObstacle(frank.x, frank.y)) frank.x--;
                Object.keys(keys).forEach(k => keys[k] = false);
                draw();
            }

            function movePlayer() {
                if (!gameRunning || gameWin || gameLose) return;
                let newX = player.x, newY = player.y;
                if (keys.ArrowLeft) newX--;
                if (keys.ArrowRight) newX++;
                if (keys.ArrowUp) newY--;
                if (keys.ArrowDown) newY++;

                if (isHouse(newX, newY)) {
                    gameWin = true;
                    gameRunning = false;
                    statusSpan.textContent = 'VITTORIA!';
                    player.x = newX; player.y = newY;
                    return;
                }
                if (!isObstacle(newX, newY)) {
                    player.x = newX;
                    player.y = newY;
                }
            }

            function moveFrank() {
                if (!gameRunning || gameWin || gameLose) return;
                let dx = player.x - frank.x;
                let dy = player.y - frank.y;
                if (Math.abs(dx) > Math.abs(dy)) {
                    let newX = frank.x + (dx > 0 ? 1 : -1);
                    if (!isObstacle(newX, frank.y)) frank.x = newX;
                    else {
                        let newY = frank.y + (dy > 0 ? 1 : -1);
                        if (!isObstacle(frank.x, newY)) frank.y = newY;
                    }
                } else {
                    let newY = frank.y + (dy > 0 ? 1 : -1);
                    if (!isObstacle(frank.x, newY)) frank.y = newY;
                    else {
                        let newX = frank.x + (dx > 0 ? 1 : -1);
                        if (!isObstacle(newX, frank.y)) frank.x = newX;
                    }
                }
                if (frank.x === player.x && frank.y === player.y) {
                    gameLose = true;
                    gameRunning = false;
                    statusSpan.textContent = 'FRANK VINCE';
                }
            }

            function moveToby() {
                if (!gameRunning) return;
                let newX = toby.x + toby.direction;
                if (isObstacle(newX, toby.y)) {
                    toby.direction *= -1;
                    newX = toby.x + toby.direction;
                }
                toby.x = newX;
            }

            function update() {
                if (!gameRunning || gameWin || gameLose) return;
                frames++;
                if (frames % 5 === 0) moveFrank();
                if (frames % 8 === 0) moveToby();
                movePlayer();
            }

            function draw() {
                drawBackground();

                for (let row = 0; row < GRID_ROWS; row++) {
                    for (let col = 0; col < GRID_COLS; col++) {
                        if (map[row][col] === 1) drawTree(col, row);
                        else if (map[row][col] === 2) drawBush(col, row);
                        else if (map[row][col] === 3) drawFence(col, row);
                    }
                }

                drawHouse();
                drawChurch();
                drawCar();
                drawDonAldo(donAldo.x, donAldo.y);
                drawToby(toby.x, toby.y);
                drawFrank(frank.x, frank.y);
                drawPlayer(player.x, player.y);

                if (gameWin) {
                    ctx.fillStyle = 'rgba(0,255,0,0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = 'bold 48px "Courier New", monospace';
                    ctx.fillStyle = '#00ff00';
                    ctx.shadowBlur = 20;
                    ctx.fillText('VITTORIA!', canvas.width/2-180, canvas.height/2-40);
                    ctx.font = 'bold 32px "Courier New", monospace';
                    ctx.fillText('Procedi distruggendo', canvas.width/2-220, canvas.height/2+20);
                    ctx.fillText('la casa della musica', canvas.width/2-200, canvas.height/2+70);
                    ctx.shadowBlur = 0;
                }
                if (gameLose) {
                    ctx.fillStyle = 'rgba(255,0,0,0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = 'bold 48px "Courier New", monospace';
                    ctx.fillStyle = '#ff0000';
                    ctx.shadowBlur = 20;
                    ctx.fillText('Vince Frank.', canvas.width/2-180, canvas.height/2-30);
                    ctx.fillText('Annullo TSO', canvas.width/2-140, canvas.height/2+30);
                    ctx.shadowBlur = 0;
                }
            }

            function gameLoop() {
                update();
                draw();
                frameId = requestAnimationFrame(gameLoop);
            }

            function startGame() {
                if (gameWin || gameLose) return;
                gameRunning = true;
                statusSpan.textContent = 'IN CORSO';
            }

            // Eventi tastiera (per debug desktop)
            window.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    keys[e.key] = true;
                }
            });
            window.addEventListener('keyup', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    keys[e.key] = false;
                }
            });

            // Touch
            document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowUp = true; });
            document.getElementById('btnUp').addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowUp = false; });
            document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowDown = true; });
            document.getElementById('btnDown').addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowDown = false; });
            document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowLeft = true; });
            document.getElementById('btnLeft').addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowLeft = false; });
            document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowRight = true; });
            document.getElementById('btnRight').addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowRight = false; });

            // Mouse
            ['Up','Down','Left','Right'].forEach(dir => {
                const btn = document.getElementById(`btn${dir}`);
                btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[`Arrow${dir}`] = true; });
                btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[`Arrow${dir}`] = false; });
                btn.addEventListener('mouseleave', (e) => { keys[`Arrow${dir}`] = false; });
            });

            startBtn.addEventListener('click', startGame);
            resetBtn.addEventListener('click', () => {
                resetGame();
                draw();
            });

            resetGame();
            gameLoop();
        })();
    </script>
</body>
</html>
